# ── Agent Global Settings ─────────────────────────────────────────────────────
agent:
  mode: paper                         # paper | live
  primary_exchange: blofin
  log_level: INFO
  heartbeat_interval: 5               # seconds

# ── Trading Universe ─────────────────────────────────────────────────────────
trading:
  symbols:
    - BTC-USDC
    - ETH-USDC
    - SOL-USDC
    - XRP-USDC
    - DOGE-USDC
    - ENA-USDC
    - LINK-USDC
    - ADA-USDC
    # BNB-USDC: DISABLED — OOS Sharpe=-3.99 WR=43% (net loser, removed Mar-07)
    # SUI-USDC: DISABLED — OOS Sharpe=-1.46 WR=50% (marginal loser, removed Mar-07)
    # PIPPIN-USDT: DISABLED — wrong quote currency (USDT vs USDC), removed Mar-07
  market_types:
    - futures                         # futures | spot
  default_leverage: 5
  max_leverage: 20
  timeframes:
    - 1m
    - 3m
    - 5m
    - 15m
    - 1h
    - 4h
    - 1d
  primary_timeframe: 15m

# ── Signal Engine ─────────────────────────────────────────────────────────────
signals:
  min_confidence_threshold: 25        # minimum ensemble confidence to generate a signal
  confluence_required: 3              # all 3 subscribed TFs (15m+1h+4h) must agree
  lookback_candles: 500               # candles fed into ML models

# ── Risk Manager ─────────────────────────────────────────────────────────────
risk:
  max_portfolio_risk_pct: 2.0         # max % of portfolio at risk at any time
  max_single_trade_risk_pct: 0.5      # max % risked per trade
  max_daily_drawdown_pct: 5.0         # circuit breaker: halt if exceeded
  max_weekly_drawdown_pct: 10.0
  kelly_fraction: 0.25                # fractional Kelly (conservative)
  min_liquidation_distance_atr: 3.0   # entry must be 3x ATR from liquidation
  max_open_positions: 10
  max_correlated_positions: 3         # max positions in correlated assets (raised for 10-symbol universe)
  atr_sl_multiplier: 1.5              # 5m-scalp mode: tighter stop (5m ATR ~$200-300 BTC vs $600-800 on 15m)
  rr_ratio: 2.0                       # 5m-scalp mode: TP hit faster in absolute time with smaller ATR
  adx_min_threshold: 20.0             # minimum ADX to confirm trend — blocks ranging market entries
  trailing_stop_activation_atr: 0     # disabled — tested: creates tiny wins that don't offset full SL losses
  trailing_stop_distance_atr: 1.5     # trail N×ATR behind the best price seen (for future use)
  breakeven_activation_atr: 0.8       # 5m-scalp: tighter than 15m (0.8 ATR), looser than old 0.5 that caused chop
  partial_tp_ratio: 0.5               # close 50% at 1:1 R — lock in quick profit, let 50% run to 2:1
  max_hold_hours: 3                   # 5m-scalp mode: exit after 3h max — no overnight positions

# ── Execution ─────────────────────────────────────────────────────────────────
execution:
  default_order_type: limit           # limit | market
  limit_order_offset_pct: 0.05        # how far inside spread to place limit
  max_slippage_pct: 0.1               # cancel if expected slippage exceeds this
  order_timeout_seconds: 30           # cancel unfilled limit orders after N sec
  retry_attempts: 3
  retry_backoff_seconds: 2

# ── Paper Trading ─────────────────────────────────────────────────────────────
paper:
  starting_balance: 10000             # USDT
  simulated_fee_pct: 0.05             # maker fee
  simulated_slippage_pct: 0.02

# ── Sentiment & Intelligence ─────────────────────────────────────────────────
sentiment:
  enabled: true
  refresh_interval_seconds: 300        # 5 minutes
  
  # Fear & Greed Index
  fear_greed_enabled: true
  fear_greed_weight: 0.35
  
  # News aggregation
  news_enabled: true
  news_sources:                      # priority order
    - cryptocompare
    - coingecko
  news_weight: 0.25
  
  # Twitter/X sentiment (disabled - API now requires paid subscription)
  twitter_enabled: false
  twitter_weight: 0.0
  
  # Reddit sentiment (disabled - requires API approval)
  reddit_enabled: false
  reddit_weight: 0.0
  
  # Google Trends
  google_trends_enabled: true
  google_trends_weight: 0.10

# ── On-Chain Data ─────────────────────────────────────────────────────────────
onchain:
  enabled: true
  refresh_interval_seconds: 300        # 5 minutes
  
  # Cross-exchange funding rates (free APIs)
  funding_enabled: true
  funding_weight: 0.30
  
  # Open Interest (free from Binance)
  oi_enabled: true
  oi_weight: 0.25
  
  # Liquidations (estimated from price moves)
  liquidations_enabled: true
  liquidations_weight: 0.25
  
  # BTC Dominance (free from CoinGecko)
  dominance_enabled: true
  dominance_weight: 0.20
  
  # Whale Alerts (disabled - requires paid API)
  whales_enabled: false
  whale_min_value_usd: 100000

# ── Signal Weights ───────────────────────────────────────────────────────────
ensemble_weights:
  technical: 0.40   # raised: ML was overriding TA when biased SHORT in uptrend
  structure: 0.30   # raised: pure price-action shouldn't be overridden by stale model
  ml: 0.10          # reduced from 0.25 — models are period-biased; retrain weekly
  volume: 0.10
  sentiment: 0.05
  onchain: 0.05

# ── Per-Symbol Overrides ─────────────────────────────────────────────────────
# Based on grid search (3000 bars, 25% OOS split) — Mar 02 2026
# 15m thresholds applied globally per symbol (primary ML timeframe)
# 3m/5m OOS highlights noted in comments for reference
symbol_overrides:
  # ── 5m-scalp optimized (Mar-07 2026) — primary TF now 5m, ATR from 5m candle ──
  # Format: {min_confidence_threshold, atr_sl_multiplier}
  # 5m backtest results used where available (OOS Sharpe in comments)
  BTC-USDC:  {min_confidence_threshold: 50, atr_sl_multiplier: 1.5}  # 5m OOS Sharpe=14.35 WR=~55% — best performer
  ETH-USDC:  {min_confidence_threshold: 65, atr_sl_multiplier: 2.0}  # muted (Mar-07): live 1W/4L -19.1% — high threshold until next retrain
  SOL-USDC:  {min_confidence_threshold: 30, atr_sl_multiplier: 2.0}  # 5m OOS Sharpe=11.17 — strong
  XRP-USDC:  {min_confidence_threshold: 30, atr_sl_multiplier: 2.0}  # 5m OOS Sharpe=11.04 — strong (was 55 on 15m, 30 works on 5m)
  DOGE-USDC: {min_confidence_threshold: 25, atr_sl_multiplier: 1.5}  # 5m OOS Sharpe=3.47 — moderate, tight SL
  ENA-USDC:  {min_confidence_threshold: 35, atr_sl_multiplier: 1.5}  # 15m OOS Sharpe=+12.24 — keeping 15m params, 5m not backtested yet
  LINK-USDC: {min_confidence_threshold: 30, atr_sl_multiplier: 1.5}  # 15m OOS Sharpe=+12.00 — reducing ATR for 5m entry
  ADA-USDC:  {min_confidence_threshold: 35, atr_sl_multiplier: 2.0}  # 15m OOS Sharpe=+5.71 — keeping conservative
  # ── Disabled ──────────────────────────────────────────────────────────────
  # BNB-USDC:  DISABLED — OOS Sharpe=-3.99 WR=43%
  # SUI-USDC:  DISABLED — OOS Sharpe=-1.46 WR=50%
  # PIPPIN-USDT: DISABLED — wrong quote currency (USDT vs USDC)
